services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend_python_fastAPI/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - app-network

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT_EXTERNAL}:8000"
    volumes:
      - chromadata:/chroma/chroma
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend_python_fastAPI
      args:
        - BACKEND_PORT=${BACKEND_PORT:-8000}
    ports:
      - "${BACKEND_PORT_EXTERNAL}:${BACKEND_PORT:-8000}"
    volumes:
      - receipt_uploads:/app/uploads/receipts
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - CHROMA_HOST=${CHROMA_HOST:-chroma}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - APP_SCHEME=${APP_SCHEME}
      - DEPLOY_DOMAIN=${DEPLOY_DOMAIN}
      - FRONTEND_PORT_EXTERNAL=${FRONTEND_PORT_EXTERNAL}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_ROUTING_MODEL=${GEMINI_ROUTING_MODEL}
      - GEMINI_PLANNING_MODEL=${GEMINI_PLANNING_MODEL}
      - GEMINI_SQL_MODEL=${GEMINI_SQL_MODEL}
      - GEMINI_RESPONSE_MODEL=${GEMINI_RESPONSE_MODEL}
      - GEMINI_RECEIPT_MODEL=${GEMINI_RECEIPT_MODEL}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL}
      - GEMINI_EMBEDDING_DIMENSIONALITY=${GEMINI_EMBEDDING_DIMENSIONALITY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CORS_ALLOW_ORIGIN_REGEX=${CORS_ALLOW_ORIGIN_REGEX}
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_API_SCHEME=${VITE_API_SCHEME}
        - VITE_API_HOST=${VITE_API_HOST}
        - VITE_API_PORT=${VITE_API_PORT}
    ports:
      - "${FRONTEND_PORT_EXTERNAL}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  chromadata:
  receipt_uploads:
