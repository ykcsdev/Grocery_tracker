version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: grocery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend_python_fastAPI/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma
    restart: unless-stopped

  backend:
    build:
      context: ./backend_python_fastAPI
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/grocery
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      # Provide your Gemini API key via .env file or env variables when running
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - chroma
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  chromadata:
